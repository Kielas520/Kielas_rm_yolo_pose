kielas_rm_train:
  dataset:
    raw_dir: "./data/raw"      # 确保本地有这个目录
    purify_dir: "~/autodl-fs/purify"
    balance_dir: "./data/balance"
    datasets_dir: "./data/datasets"
    balance:
      max_samples_per_class: 3000

  augment:
    # --- 基础与光学增强 ---
    brightness_prob: 0.8        # 适度提高触发概率，应对赛场明暗交替
    brightness_range: [0.5, 2.0]  # 拓宽暗部下限，适应极暗环境
    blur_prob: 0.5              # 提升运动模糊概率，贴合高速移动特征
    blur_ksize: [3, 5, 7]       
    hsv_prob: 0.5               
    hsv_h_gain: 0.015           # 保持极低（关键）：防止红蓝颜色发生反转
    hsv_s_gain: 0.4             
    hsv_v_gain: 0.4             # 从0.8下调至0.4，0.8容易导致过度曝光从而丢失特征点
    noise_prob: 0.3             # 模拟高ISO下的相机传感器噪点
    bloom_prob: 0.5             # 发光目标对光晕效果非常敏感，提高概率有奇效
    
    # --- 几何变换增强 ---
    flip_prob: 0.0              # 你的代码已正确处理了4点的左右镜像映射，可直接拉满到0.5
    scale_prob: 0.5             
    scale_range: [0.5, 1.7]     # 稍微扩大缩放范围，模拟更广的远近距离跨度
    rotate_prob: 0.7            
    rotate_range: [-25, 25]     # 增加倾斜角度，适应更极限的车体姿态
    translate_prob: 0.6         
    translate_range: 0.3        
    perspective_prob: 0.6       # 提高透视形变概率，实战中大多是斜向视角
    perspective_factor: 0.2    # 稍微增加形变的剧烈程度

    # --- 背景替换增强 ---
    bg_replace_prob: 0.5        # 适当提高以降低对特定场地背景的过拟合
    bg_dir: "./background"      
    bg_radius_factor: 1.3       # 从1.5收紧到1.3，避免截取时带入过多原图的背景像素
    
    # --- 遮挡增强 ---
    occ_prob: 0.4               # 实战中被枪管或其他车体遮挡很常见，提高遮挡概率
    occ_radius_pct: 0.2

    split:
      val: 0.2

  # --- 训练超参数 ---
  train:
    device: "cuda"              # 可选: "auto", "cuda", "cpu"
    batch_size: 128
    epochs: 100
    weight_decay: 0.01        # 正则化惩罚力度 （0.01 - 0.05）
    save_dir: "./model_res"
    input_size: [416, 416]
    strides: [8, 16, 32] # 缩放比例
    reg_max: 16                 # <--- 新增：关键点分布偏移网格范围参数 (预测范围)，决定了网络有没有能力**“够得着”**占据大画幅的近距离装甲板角

    continue:
      path: "./model_res/best_model.pth"

    cache_loader:
      load: true
      device: 'cpu'
    
    optimizer:
      base_lr: 0.0002
      betas: [0.940, 0.999] # 一阶矩估计的指数衰减率 将 0.9 改为 0.940

    # 新增后处理配置块
    post_process:
      # # 置信度阈值（通常是 conf_threshold = 0.5）。
      # 在前几个 epoch，模型还在“摸黑走路”，它输出的目标置信度可能只有 0.1 或者 0.2。
      # 既然连 0.5 的及格线都没到，NMS（非极大值抑制）阶段就把所有预测框全过滤掉了，相当于模型交了“白卷”，PCK 自然就是 0。
      conf_threshold: 0.5 
      kpt_dist_thresh: 15.0

    data:
      class_id: [0, 2, 5, 6, 8, 11]
      # --- 数据集路径与加载配置 ---
      train_img_dir: "./data/datasets/images/train"
      train_label_dir: "./data/datasets/labels/train"
      val_img_dir: "./data/datasets/images/val"
      val_label_dir: "./data/datasets/labels/val"
      num_workers: 0 # 数据搬运到cpu了，你开多线程纯有病
      # 对应 stride [8, 16, 32]
      # Stride 8  负责 0-64 像素 (远)
      # Stride 16 负责 48-128 像素 (中)
      # Stride 32 负责 112-9999 像素 (近)
      scale_ranges: [[0, 23], [20, 90], [87, 416]]

    # --- 损失函数权重 ---
    loss:
      lambda_pose: 5.0
      lambda_cls: 4.0   # 新增分类损失的权重
      alpha: 0.25
      gamma: 2.0
      omega: 10.0
      epsilon: 2.0

    pck:
      target_in_range_dist: 20.0
      max_pixel_threshold: 5.0 # 根据网格计算比较适合的值，416x416 的图片大小对应 52x52 个网格，每个网格大小为 416/52 = 8，所以最好超过半个网格的大小，设定为 5
    
    # 新增：综合评估得分权重配置
    metric_weights:
      pck: 0.55        # PCK 占总分的权重
      id_acc: 0.45     # 类别 ID 准确率占总分的权重

    # --- 新增：提前停止机制 ---
    early_stopping:
      enabled: true        # 是否开启自动停止
      min_score: 0.98        # 验证集 pck 高于此值就停止训练

  tools:
    background:
      url: "http://groups.csail.mit.edu/vision/LabelMe/NewImages/indoorCVPR_09.tar"
      tar_name: "indoorCVPR_09.tar"
      limit: 5000
      max_res: 1280
      min_res: 320
      use_proxy: false
      proxies:
        http: "http://127.0.0.1:7897"
        https: "http://127.0.0.1:7897"

kielas_rm_export:
  # 权重文件路径
  weights: "./model_res/best_model.pth"
  # 导出模型存放目录
  output_dir: "./export_res"
  # 导出格式列表，支持 "onnx", "torchscript"
  formats: 
    - "onnx"
    - "torchscript"
  # 模型输入尺寸 [宽, 高]
  input_size: [416, 416]
  
  onnx:
    opset: 18
    # 是否开启极致轻量化 (需要安装 onnx 和 onnx-simplifier)
    simplify: true

kielas_rm_demo:
  # 相机类型可选: "usb" (标准UVC相机), "hik" (海康工业相机)
  camera_type: "hik" 
  # 相机索引或视频文件路径
  camera_index: 0
  
  # 海康相机专用配置 (单位: us)
  hik_exposure: 5000
  hik_gain: 10
  
  # 原有配置保持不变...
  model_type: "onnx" 
  model_path: "./export_res/best_model.onnx"
  device: "cuda"
  input_size: [416, 416]
  strides: [8, 16, 32]
  conf_threshold: 0.7
  kpt_dist_thresh: 15.0